name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check that every .py file compiles
        run: python -m py_compile puedo_comerlo.py logica.py ilustraciones.py vision_ia.py

      - name: Run unit tests
        run: python -m unittest discover -s tests -v
